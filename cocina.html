<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cocina</title>
    <style>
        :root { --bg: #f1f5f9; --p: #1e293b; --si: #22c55e; --lonchera: #eab308; --tarde: #a855f7; --temprano: #06b6d4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: var(--p); margin-top: 0; }
        input[type="date"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 1rem; margin-bottom: 15px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .summary-box { padding: 15px; border-radius: 12px; color: white; text-align: center; }
        .bg-d { background: #3b82f6; } .bg-a { background: #10b981; } .bg-c { background: #6366f1; }
        .box-num { font-size: 2rem; font-weight: 800; display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 0.85rem; text-transform: uppercase; }
        td { padding: 12px; border-top: 1px solid #f1f5f9; font-size: 0.95rem; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; color: white; }
        .diet-badge { background: #ef4444; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🍳 Panel de Cocina</h1>
            <input type="date" id="dateFilter" onchange="fetchData()">
            
            <div id="loading" style="display:none; text-align:center; padding:10px;">Cargando pedidos...</div>

            <div class="summary-grid">
                <div class="summary-box bg-d">
                    <span class="box-num" id="totalD">0</span> Desayunos
                </div>
                <div class="summary-box bg-a">
                    <span class="box-num" id="totalA">0</span> Almuerzos
                </div>
                <div class="summary-box bg-c">
                    <span class="box-num" id="totalC">0</span> Cenas
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Detalle de Pedidos</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Comensal</th>
                            <th>Servicio</th>
                            <th>Estado / Opción</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbya27_mD5ZljhE-M1UX59Z3xLctAWu__3NlNLxrUK-a-eZLzMCYTuF67cyUdVbsVD8vsw/exec";

        // Establecer fecha de hoy al iniciar
        const dateInput = document.getElementById('dateFilter');
        const today = new Date();
        dateInput.value = today.toISOString().split('T')[0];

        async function fetchData() {
            const loading = document.getElementById('loading');
            const targetDate = dateInput.value;
            if(!targetDate) return;

            loading.style.display = "block";
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Filtrar datos por la fecha seleccionada
                const filtered = data.filter(r => {
                    const rDate = r.date.split('T')[0];
                    return rDate === targetDate;
                });

                renderTable(filtered);
                updateCounters(filtered);
            } catch (e) {
                console.error("Error cargando datos:", e);
                alert("Error al conectar con el servidor.");
            }
            loading.style.display = "none";
        }

        function updateCounters(data) {
            document.getElementById('totalD').innerText = data.filter(r => r.type === 'Desayuno').length;
            document.getElementById('totalA').innerText = data.filter(r => r.type === 'Almuerzo').length;
            document.getElementById('totalC').innerText = data.filter(r => r.type === 'Cena').length;
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            body.innerHTML = "";

            if(data.length === 0) {
                body.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No hay pedidos para este día.</td></tr>";
                return;
            }

            // Ordenar por Tipo de Servicio
            const order = { "Desayuno": 1, "Almuerzo": 2, "Cena": 3 };
            data.sort((a, b) => order[a.type] - order[b.type]);

            data.forEach(r => {
                const tr = document.createElement('tr');
                const isBlanda = String(r.blanda).toUpperCase() === "TRUE";
                
                tr.innerHTML = `
                    <td style="font-weight:bold;">${r.user}</td>
                    <td>${r.type}</td>
                    <td>
                        <span class="badge" style="background:${getColor(r.status)}">${r.status}</span>
                        ${isBlanda ? '<span class="badge diet-badge">🤢 DIETA</span>' : ''}
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function getColor(status) {
            const colors = {
                'Sí': '#22c55e',
                'Lonchera': '#eab308',
                'Tarde': '#a855f7',
                'Temprano': '#06b6d4',
                'No': '#64748b'
            };
            return colors[status] || '#64748b';
        }

        // Carga inicial
        fetchData();
        // Recarga automática cada 5 minutos
        setInterval(fetchData, 300000);
    </script>
</body>
</html>
